<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Show polygon information on click</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
<style>
    /* Существующие стили */
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    .calculation-box {
        position: absolute;
        top: 10px;
        left: 10px;
        background-color: rgba(255, 255, 255, 0.72);
        padding: 6px;
        border-radius: 5px;
        font-size: 14px;
        max-width: 300px;
    }
    .button-container {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 1;
    }
    .button {
        padding: 8px 16px;
        background-color: rgba(128, 128, 128, 0.5);
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    .button:hover {
        background-color: rgba(128, 128, 128, 0.8);
    }

    /* Стилизация выпадающего списка */
    #color-column {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1;
        width: 200px;
        background-color: rgba(255, 255, 255, 0.75); /* Полупрозрачный фон */
        padding: 5px;
        border-radius: 5px; /* Скругленные углы */
        font-size: 14px;
        cursor: pointer;
    }
</style>
</head>

<body>
<div id="map"></div>
<div class="calculation-box" id="sidebar"></div>
<div class="button-container">
    <button class="button" onclick="resetMap()">Reset</button>
    <button class="button" onclick="toggleFullScreen()">Full Screen</button>
</div>
<select id="color-column" onchange="updatePolygonColors()">
    <option value="Весь город">Весь город</option>
    <option value="Бары">Бары</option>
    <option value="Кафе">Кафе</option>
    <option value="Каршеринг">Каршеринг</option>
    <option value="Кинотеатры">Кинотеатры</option>
    <option value="Коворкинги">Коворкинги</option>
    <option value="Отели">Отели</option>
    <option value="Метро">Метро</option>
    <option value="Музеи">Музеи</option>
    <option value="Обмен валют">Обмен валют</option>
    <option value="Парки">Парки</option>
    <option value="Театры">Театры</option>
    <option value="Торговые центры">Торговые центры</option>


</select>
<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoic2VhbGltYSIsImEiOiJjbTdvcDUwd2IwN2o4Mm1zZXBraHIzaTQ5In0.AAdfCjRec4FNE5y6Hqtbyw';
        map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/standard',
            center: [76.879751, 43.24517],
            zoom: 12
});

map.on('load', async () => {
    const geojsonUrl = 'https://raw.githubusercontent.com/sealaluma/sayakhaaaaaaaaaaaaaaaaaaaaaaaaaat/main/t_objects_hex%20(2).geojson';
    const response = await fetch(geojsonUrl);
    const geojsonData = await response.json();

    map.addSource('custom-data', {
        'type': 'geojson',
        'data': geojsonData
    });

    map.addLayer({
        'id': 'custom-data-layer',
        'type': 'fill',
        'source': 'custom-data',
        'paint': {
        'fill-color': [
            'case',
            ['has', 'Всего'], 
            ['interpolate', ['linear'], ['get', 'Всего'], 
                0, 'rgba(255, 255, 255, 0.2)',  // Very light white
                30, 'rgba(17, 119, 187, 0.3)',  // Light blue
                50, 'rgba(0, 170, 0, 0.3)',     // Light green
                75, 'rgba(255, 204, 0, 0.3)',   // Light yellow
                105, 'rgba(255, 0, 0, 0.3)'     // Light red
            ], 
            'rgba(255, 255, 255, 0)'  // Fully transparent if no data
        ],
        'fill-opacity': 0.5,  // Adjust transparency (0 = fully transparent, 1 = solid)
        'fill-outline-color': 'rgba(0, 0, 0, 1)'  // Black outline, fully visible
        }
    });
        // Add a layer for the highlighted polygon outline.
        map.addLayer({
        'id': 'highlighted-polygon-outline',
        'type': 'line',
        'source': 'custom-data',
        'filter': ['==', 'id', ''],
        'paint': {
            'line-color': 'rgba(0, 0, 0, 1)',
            'line-width': 2
        }
    });

    const pointsGeoJSON = {
        'type': 'FeatureCollection',
        'features': geojsonData.features.map(feature => ({
            'type': 'Feature',
            'geometry': {
                'type': 'Point',
                'coordinates': [feature.properties.longitude, feature.properties.latitude]
            },
            'properties': feature.properties
        }))
    };

    map.addSource('points-data', {
        'type': 'geojson',
        'data': pointsGeoJSON
    });

    map.addLayer({
        'id': 'points-layer',
        'type': 'circle',
        'source': 'points-data',
        'paint': {
            'circle-radius': 4,
            'circle-color': '#FF0000',
            'circle-stroke-width': 1,
            'circle-stroke-color': '#FFFFFF'
        }
    });

    map.on('click', (e) => {
    const sidebar = document.getElementById('sidebar');

    // Проверяем точки (points-layer)
    const pointFeatures = map.queryRenderedFeatures(e.point, { layers: ['points-layer'] });
    if (pointFeatures.length) {
        const properties = pointFeatures[0].properties;
        sidebar.innerHTML = `
            <strong>${properties.name_ru || properties.name_eng || 'Неизвестно'}</strong><br>
            Адрес: ${properties.address || 'Не указан'}<br>
            Рейтинг: ${properties.rating || 'Не указан'}<br>
            Время работы: ${properties.work_hours || 'Не указано'}
            <button id="closeSidebar" style="float:right; background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">X</button>
        `;

        // Добавляем обработчик закрытия
        document.getElementById('closeSidebar').addEventListener('click', () => {
            sidebar.innerHTML = '';
        });

        return;
    }

    // Проверяем полигоны (custom-data-layer)
    const polygonFeatures = map.queryRenderedFeatures(e.point, { layers: ['custom-data-layer'] });
    if (!polygonFeatures.length) return;

    let sidebarContent = `
        <button id="closeSidebar" style="float:right; background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">X</button>
        <strong>Объекты в данной области:</strong>
        <div style="max-height: 300px; overflow-y: auto; padding-right: 5px;">
            <ul>
    `;

    // Проходимся по всем объектам в выбранном хексагоне
    polygonFeatures.forEach(feature => {
        const properties = feature.properties;
        sidebarContent += `
            <li>
                <strong>${properties.name_ru || properties.name_eng || 'Неизвестно'}</strong><br>
                Адрес: ${properties.address || 'Не указан'}<br>
                Рейтинг: ${properties.rating || 'Не указан'}<br>
                Время работы: ${properties.work_hours || 'Не указано'}
            </li>
            <hr>
        `;
    });

    sidebarContent += `</ul></div>`;

    sidebar.innerHTML = sidebarContent;

    // Добавляем обработчик закрытия
    document.getElementById('closeSidebar').addEventListener('click', () => {
        sidebar.innerHTML = '';
    });

    // Выделяем хексагон (берем ID первого объекта, но это ок, если все объекты в одном хексагоне)
    map.setFilter('highlighted-polygon-outline', ['==', 'id', polygonFeatures[0].properties.id]);
    });
});
    
function resetMap() {
    map.setFilter('custom-data-layer', null);  // Показывать все хексагоны
    map.setFilter('points-layer', null);  // Показывать все точки

    map.flyTo({
        center: [76.879751, 43.24517],
        zoom: 12,
        essential: true
    });

    document.getElementById('sidebar').innerHTML = '';
    document.getElementById('color-column').value = "Весь город"; // Сбросить select
}



function toggleFullScreen() {
    var button = document.querySelector('.button-container .button:nth-child(2)');
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        button.textContent = 'Свернуть';
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
            button.textContent = 'Во весь экран';
        }
    }
}

function updatePolygonColors() {
    const selectedCategory = document.getElementById('color-column').value;

    // Если выбрана категория "Весь город", сбрасываем фильтры
    if (selectedCategory === "Весь город") {
        map.setFilter('custom-data-layer', null); // Показывать все хексагоны
        map.setFilter('points-layer', null); // Показывать все точки
        return;
    }

    // Соответствие названий категорий их ID
    const categoryMapping = {
        "Бары": 1,
        "Кафе": 2,
        "Каршеринг": 3,
        "Кинотеатры": 4,
        "Коворкинги": 5,
        "Отели": 6,
        "Метро": 7,
        "Музеи": 8,
        "Обмен валют": 9,
        "Парки": 10,
        "Театры": 11,
        "Торговые центры": 12,
        "Хостелы": 13,
        "Мотели": 14,
        "Глемпинг": 15
    };

    const selectedCategoryId = categoryMapping[selectedCategory];

    // Фильтруем хексагоны и точки по category_id
    map.setFilter('custom-data-layer', ['==', ['get', 'category_id'], selectedCategoryId]);
    map.setFilter('points-layer', ['==', ['get', 'category_id'], selectedCategoryId]);
}

</script>
</body>
</html>
